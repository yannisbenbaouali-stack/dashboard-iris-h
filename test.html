<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Supabase</title></head>
<body style="background:#111;color:#ccc;font-family:monospace;padding:2rem">
<h2>Test connexion Supabase</h2>
<div id="log"></div>
<script>
const log = document.getElementById('log');
function addLog(msg, color='#ccc') {
  log.innerHTML += `<div style="color:${color};margin:.3rem 0">${msg}</div>`;
}

async function test() {
  const url = 'https://kkznkuwoxoxvapejzytv.supabase.co';
  const key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtrem5rdXdveG94dmFwZWp6eXR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTQxMTksImV4cCI6MjA4ODkzMDExOX0.Nb7N2FpKvm3NMzS6Nhx4qWoqHZW3-Es3JNPgHxkOWcE';
  
  addLog('1. Test fetch deals...');
  try {
    const resp = await fetch(url + '/rest/v1/deals?limit=3', {
      headers: {
        'apikey': key,
        'Authorization': 'Bearer ' + key
      }
    });
    addLog('   Status: ' + resp.status, resp.ok ? '#41c98e' : '#f87171');
    addLog('   Headers: ' + JSON.stringify(Object.fromEntries(resp.headers)));
    const data = await resp.json();
    addLog('   Deals: ' + data.length, '#41c98e');
    addLog('   Premier: ' + (data[0]?.nom || 'aucun'), '#5b9cf6');
  } catch(e) {
    addLog('   ERREUR: ' + e.message, '#f87171');
    addLog('   Type: ' + e.name, '#f87171');
  }

  addLog('');
  addLog('2. Test localStorage config...');
  const cfg = localStorage.getItem('iris_h_cfg');
  addLog('   Config: ' + (cfg || 'VIDE'), cfg ? '#41c98e' : '#f87171');
  if(cfg) {
    try {
      const parsed = JSON.parse(cfg);
      addLog('   URL: ' + parsed.url, parsed.url === url ? '#41c98e' : '#f87171');
      addLog('   Key length: ' + (parsed.key?.length || 0), parsed.key?.length > 100 ? '#41c98e' : '#f87171');
      if(parsed.key !== key) addLog('   ATTENTION: clé différente de celle attendue!', '#fb923c');
    } catch(e) {
      addLog('   Erreur parse: ' + e.message, '#f87171');
    }
  }
}
test();
</script>
</body></html>
