<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>IRIS H · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0e1f4d;--navy2:#162a5c;--navy3:#1d3570;
  --blue:#5B9BD5;--blue2:#7AB3E0;--blue-bg:rgba(91,155,213,0.08);--blue-border:rgba(91,155,213,0.2);
  --bg:#f4f6fa;--card:#fff;--border:#e2e6ef;--border2:#d1d5e0;
  --text:#1a1d2b;--dim:#7a7f8e;--dim2:#b0b4c0;
  --green:#2ecc71;--green-bg:#eafaf1;--red:#e74c3c;--red-bg:#fdecea;
  --orange:#f39c12;--orange-bg:#fef5e7;--purple:#7F77DD;--purple-bg:#f0effe;
  --font:'Nunito Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}

/* SETUP */
#setup{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000}
#setup.hidden{display:none}
.setup-box{background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:2.5rem;max-width:440px;width:100%}
.setup-logo{font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:4px}
.setup-logo span{color:var(--blue)}
.setup-sub{font-size:11px;letter-spacing:3px;color:var(--dim2);margin-bottom:2rem;text-transform:uppercase}
.setup-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);margin-bottom:6px;margin-top:1rem}
.setup-input{width:100%;background:var(--navy);border:1px solid var(--navy3);border-radius:8px;padding:10px 12px;font-family:var(--font);font-size:13px;color:#fff;outline:none}
.setup-input:focus{border-color:var(--blue)}
.setup-btn{margin-top:1.5rem;width:100%;background:var(--blue);border:none;border-radius:8px;padding:12px;font-family:var(--font);font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.setup-btn:hover{background:var(--blue2)}
.setup-note{font-size:11px;color:var(--dim2);margin-top:1rem;line-height:1.6}

/* LAYOUT */
#app{display:none;height:100%;flex-direction:row}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-header{padding:20px 18px 12px}
.sb-logo{font-size:1.4rem;font-weight:700;color:#fff}
.sb-logo span{color:var(--blue);font-weight:400}
.sb-search{margin:8px 14px 14px;position:relative}
.sb-search input{width:100%;padding:8px 10px 8px 32px;background:rgba(91,155,213,0.1);border:1px solid rgba(91,155,213,0.15);border-radius:8px;font-family:var(--font);font-size:12px;color:#fff;outline:none}
.sb-search input::placeholder{color:rgba(255,255,255,0.35)}
.sb-search input:focus{border-color:var(--blue);background:rgba(91,155,213,0.15)}
.sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:rgba(255,255,255,0.35)}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.nav-item:hover{color:rgba(255,255,255,0.8);background:rgba(91,155,213,0.08)}
.nav-item.active{color:#fff;background:rgba(91,155,213,0.15)}
.nav-item.active .nav-dot{background:var(--blue)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:transparent;flex-shrink:0;transition:.12s}
.nav-cnt{margin-left:auto;font-size:10px;background:rgba(91,155,213,0.2);color:var(--blue);padding:2px 7px;border-radius:10px}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:rgba(255,255,255,0.25)}
.sb-settings{cursor:pointer;color:rgba(255,255,255,0.3);font-size:11px;margin-top:4px}
.sb-settings:hover{color:var(--blue)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:14px 28px;background:var(--card);border-bottom:1px solid var(--border)}
.topbar-title{font-size:17px;font-weight:600;color:var(--navy)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.top-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font);transition:.15s}
.top-btn:hover{background:var(--bg);border-color:var(--border2);color:var(--text)}
.top-btn.accent{border-color:var(--blue);color:var(--blue);background:rgba(91,155,213,0.05)}
.top-btn.accent:hover{background:rgba(91,155,213,0.12)}
.top-btn.warn{border-color:var(--orange);color:var(--orange)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px 28px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tab{display:none}
.tab.active{display:block}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border);border-left:4px solid var(--blue);transition:.15s}
.kpi:hover{border-color:var(--border2)}
.kpi-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-val{font-size:32px;font-weight:700;color:var(--navy);line-height:1}
.kpi-sub{font-size:12px;color:var(--dim);margin-top:6px}
.kpi.red{border-left-color:var(--red)} .kpi.red .kpi-val{color:var(--red)}
.kpi.orange{border-left-color:var(--orange)} .kpi.orange .kpi-val{color:var(--orange)}
.kpi.green{border-left-color:var(--green)} .kpi.green .kpi-val{color:var(--green)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border)}
.chart-title{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* TABLE */
.tcard{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border);margin-bottom:16px}
.tcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tcard-title{font-size:13px;font-weight:600;color:var(--navy)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 8px;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 8px;border-bottom:1px solid var(--bg);color:var(--text);vertical-align:middle}
.tbl tr:hover td{background:var(--bg)}
.td-name{font-weight:600;color:var(--navy)}
.td-link{color:var(--blue);text-decoration:none}
.td-link:hover{text-decoration:underline}

/* PILLS */
.pill{display:inline-block;padding:2px 9px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.p-iris{background:rgba(91,155,213,0.12);color:#0e1f4d}
.p-bym{background:rgba(55,138,221,0.1);color:#0C447C}
.p-ur{background:var(--purple-bg);color:#3C3489}
.p-arristo{background:#F1EFE8;color:#444}
.p-gc{background:#FBEAF0;color:#72243E}
.p-c2c{background:#E8F0F1;color:#2C3E50}
.p-infra{background:#E1F5EE;color:#085041}
.p-urg{background:var(--red-bg);color:var(--red)}
.p-high{background:var(--orange-bg);color:#b36d00}
.p-med{background:rgba(91,155,213,0.1);color:#0C447C}
.p-standby{background:#F1EFE8;color:#666}
.p-done{background:var(--green-bg);color:#1a8a4a}
.p-att{background:var(--orange-bg);color:#c57600}

/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.fbtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font);transition:.12s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* PAGER */
.pager{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:11px;color:var(--dim)}
.pager-btns{display:flex;gap:4px}
.pager-btns button{padding:4px 10px;border-radius:4px;font-size:11px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font)}
.pager-btns button:hover:not(:disabled){background:var(--bg)}
.pager-btns button:disabled{opacity:.3;cursor:default}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kcol{flex:0 0 220px;display:flex;flex-direction:column;gap:8px}
.kcol-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 12px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);background:var(--card);color:var(--dim);font-weight:600}
.kcol-hdr .kcnt{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:0 7px}
.deal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:.12s}
.deal-card:hover{border-color:var(--border2)}
.deal-name{font-size:13px;color:var(--navy);font-weight:600;margin-bottom:4px}
.deal-meta{font-size:11px;color:var(--dim);line-height:1.6}
.deal-montant{font-size:13px;color:var(--green);margin-top:4px;font-weight:600}

/* MEMO */
.memo-toggle{display:flex;gap:4px;margin-bottom:12px}
.memo-toggle-btn{padding:6px 14px;border-radius:6px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font)}
.memo-toggle-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.memo-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.memo-nav-btn{padding:5px 10px;border-radius:6px;font-size:11px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font)}
.memo-nav-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(91,155,213,0.06)}
.bible-chapter{display:none}
.bible-chapter.active{display:block}
.bible-content{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:14px;margin-bottom:8px}
.bible-meta{font-size:10px;color:var(--dim);display:flex;justify-content:space-between}
.fragment-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.fragment-header{display:flex;justify-content:space-between;margin-bottom:6px}
.fragment-date{font-size:10px;color:var(--dim)}
.fragment-text{font-size:13px;line-height:1.6;color:var(--text)}
.fragment-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.fragment-tag{font-size:10px;background:var(--bg);color:var(--dim);padding:2px 7px;border-radius:4px}

/* FIN */
.fin-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fin-nav-btn{padding:5px 10px;border-radius:6px;font-size:11px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-family:var(--font)}
.fin-nav-btn.active{border-color:var(--navy);color:var(--navy);background:rgba(14,31,77,0.05)}
.fin-section{display:none}.fin-section.active{display:block}
.budget-row{margin-bottom:12px}
.budget-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bname{color:var(--text);font-weight:500}.bpct{font-weight:600}
.budget-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.budget-fill{height:100%;border-radius:4px}
.bfill-ok{background:var(--green)}.bfill-warn{background:var(--orange)}.bfill-danger{background:var(--red)}
.budget-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:3px}
.treso-row{display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;padding:4px 0;font-size:12px}
.treso-entite{font-weight:600;color:var(--navy)}
.treso-in{color:var(--green)}.treso-out{color:var(--red)}.treso-net{font-weight:600}
.synth-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg)}
.synth-label{font-size:12px;color:var(--dim)}.synth-value{font-size:14px;font-weight:600}
.synth-value.pos{color:var(--green)}.synth-value.neg{color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--dim)}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.5}
.empty-text{font-size:13px}

/* SEARCH RESULTS */
#global-results{display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:300px;overflow-y:auto;z-index:100;font-size:12px}
#global-results .gr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bg)}
#global-results .gr-item:hover{background:var(--bg)}
.gr-type{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-right:6px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;transition:.3s;opacity:0;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .sidebar{width:60px}.sb-header,.sb-search,.sb-footer,.nav-cnt{display:none}
  .nav-item{justify-content:center;padding:12px}.nav-item span:not(.nav-dot){display:none}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .charts-row{grid-template-columns:1fr}
  .content{padding:16px}
}
/* ── MODALE DETAIL TACHE ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--dim);margin-bottom:16px}
.modal-textarea{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--font);font-size:13px;color:var(--text);resize:vertical;outline:none;line-height:1.6}
.modal-textarea:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btn{padding:8px 18px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:.15s}
.modal-btn-save{background:var(--navy);color:#fff;border-color:var(--navy)}
.modal-btn-save:hover{opacity:.85}
.modal-btn-cancel{background:transparent;color:var(--dim)}
.modal-btn-cancel:hover{background:var(--bg)}
.modal-loading{font-size:11px;color:var(--dim);margin-top:8px;display:none}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">IRIS <span>H</span></div>
    <div class="setup-sub">Dashboard</div>
    <div class="setup-label">URL Supabase</div>
    <input class="setup-input" id="inp-url" placeholder="https://xxxx.supabase.co">
    <div class="setup-label">Clé anon (anon public key)</div>
    <input class="setup-input" id="inp-key" placeholder="eyJhbG..." type="password">
    <button class="setup-btn" onclick="saveConfig()">Connecter</button>
    <div class="setup-note">Supabase → Settings → API → Project URL + anon public key.</div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-logo">IRIS <span>H</span></div>
    </div>
    <div class="sb-search">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="global-search" placeholder="Rechercher..." oninput="globalSearch(this.value)" onfocus="this.parentElement.querySelector('#global-results')&&(document.getElementById('global-results').style.display='block')" onblur="setTimeout(()=>{const r=document.getElementById('global-results');if(r)r.style.display='none'},200)">
      <div id="global-results"></div>
    </div>
    <div class="sb-nav">
      <button class="nav-item active" onclick="switchTab(this,'todo')"><span class="nav-dot"></span><span>Todo</span><span class="nav-cnt" id="nav-todo-cnt">0</span></button>
      <button class="nav-item" onclick="switchTab(this,'deals')"><span class="nav-dot"></span><span>Dealflow Projets</span><span class="nav-cnt" id="nav-deals-cnt">0</span></button>
      <button class="nav-item" onclick="switchTab(this,'prospects')"><span class="nav-dot"></span><span>Dealflow Prospects</span><span class="nav-cnt" id="nav-prospects-cnt">0</span></button>
      <button class="nav-item" onclick="switchTab(this,'finance')"><span class="nav-dot"></span><span>Finance</span></button>
      <button class="nav-item" onclick="switchTab(this,'crm')"><span class="nav-dot"></span><span>CRM</span><span class="nav-cnt" id="nav-crm-cnt">0</span></button>
      <button class="nav-item" onclick="switchTab(this,'memoire')"><span class="nav-dot"></span><span>Mémoire</span></button>
    </div>
    <div class="sb-footer">
      <div>Supabase connecté</div>
      <div id="refresh-time-sb"></div>
      <div class="sb-settings" onclick="clearConfig()">Déconnecter</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Todo</div>
      <div class="topbar-right" id="topbar-right"></div>
    </div>
    <div class="content">

      <!-- TODO -->
      <div class="tab active" id="tab-todo">
        <div class="kpis" id="todo-kpis"></div>
        <div class="charts-row" id="todo-charts"></div>
        <div id="todo-filters"></div>
        <div class="tcard"><div class="tcard-hdr"><span class="tcard-title" id="todo-count"></span></div><div id="todo-body"></div></div>
      </div>

      <!-- DEALS -->
      <div class="tab" id="tab-deals">
        <div class="kpis" id="deals-kpis"></div>
        <div id="deals-body"></div>
      </div>

      <!-- PROSPECTS -->
      <div class="tab" id="tab-prospects">
        <div class="kpis" id="prospects-kpis"></div>
        <div id="prospects-body"></div>
      </div>

      <!-- FINANCE -->
      <div class="tab" id="tab-finance">
        <div class="kpis" id="fin-kpis"></div>
        <div class="fin-nav" id="fin-nav"></div>
        <div id="fin-sections"></div>
      </div>

      <!-- CRM -->
      <div class="tab" id="tab-crm">
        <div class="kpis" id="crm-kpis"></div>
        <div class="charts-row" id="crm-charts"></div>
        <div id="crm-filters"></div>
        <div class="tcard"><div class="tcard-hdr"><span class="tcard-title" id="crm-count"></span></div><div id="crm-body"></div></div>
      </div>

      <!-- MEMOIRE -->
      <div class="tab" id="tab-memoire">
        <div class="memo-toggle" id="memo-toggle"></div>
        <div id="memo-bible-view"></div>
        <div id="memo-fragments-view" style="display:none"></div>
        <div id="memo-skills-view" style="display:none"></div>
      </div>

    </div>
  </div>
</div>

<!-- MODALE DETAIL TACHE -->
<div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal-box">
    <div class="modal-title" id="modal-task-title"></div>
    <div class="modal-sub" id="modal-task-sub"></div>
    <textarea class="modal-textarea" id="modal-task-detail" placeholder="Décris cette tâche en détail..."></textarea>
    <div class="modal-loading" id="modal-loading">Enregistrement...</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeTaskModal()">Annuler</button>
      <button class="modal-btn modal-btn-save" id="modal-save-btn" onclick="saveTaskDetail()">Mettre à jour</button>
    </div>
  </div>
</div>
<!-- MODALE NOTE PROSPECT -->
<div class="modal-overlay" id="prospect-modal" onclick="if(event.target===this)closeProspectModal()">
  <div class="modal-box">
    <div class="modal-title" id="modal-prospect-title"></div>
    <div class="modal-sub" id="modal-prospect-sub">Note prospect</div>
    <textarea class="modal-textarea" id="modal-prospect-note" placeholder="Ajoute une note..."></textarea>
    <div class="modal-loading" id="modal-prospect-loading">Enregistrement...</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeProspectModal()">Annuler</button>
      <button class="modal-btn modal-btn-save" id="modal-prospect-save" onclick="saveProspectNote()">Mettre à jour</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const CFG_KEY='iris_h_cfg';
let cfg=null;
let data={contacts:[],taches:[],taches_v2:[],rec_suivi:[],deals:[],chantiers:[],tresorerie:[],fragments:[],bible:[],skills:[],prospects:[]};

function getConfig(){try{const s=JSON.parse(localStorage.getItem(CFG_KEY));if(s&&s.url&&s.key)return s}catch(e){}return null}
function saveConfig(){
  const url=document.getElementById('inp-url').value.trim().replace(/\/$/,'');
  const key=document.getElementById('inp-key').value.trim();
  if(!url||!key){showToast('Renseigne URL + clé');return}
  localStorage.setItem(CFG_KEY,JSON.stringify({url,key}));cfg={url,key};boot();
}
function clearConfig(){if(!confirm('Déconnecter ?'))return;localStorage.removeItem(CFG_KEY);location.reload()}

async function supa(table,params='',fetchAll=false){
  if(!fetchAll){
    const r=await fetch(`${cfg.url}/rest/v1/${table}?${params}&limit=1000`,{headers:{'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json'}});
    if(!r.ok)throw new Error(`${table}:${r.status}`);return r.json();
  }
  let all=[],off=0;
  while(true){
    const r=await fetch(`${cfg.url}/rest/v1/${table}?${params}&limit=1000&offset=${off}`,{headers:{'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json'}});
    if(!r.ok)throw new Error(`${table}:${r.status}`);const p=await r.json();all=all.concat(p);if(p.length<1000)break;off+=1000;
  }
  return all;
}

async function loadAll(){
  const safe=async fn=>{try{return await fn()}catch(e){console.warn('Warning:',e);return[]}};
  const[taches,taches_v2,rec_suivi,deals,chantiers,tresorerie,fragments,bible,skills,prospects]=await Promise.all([
    safe(()=>supa('taches','order=created_at.desc')),
    safe(()=>supa('taches_v2','order=created_at.asc')),
    safe(()=>supa('taches_recurrentes_suivi','order=semaine.asc')),
    safe(()=>supa('deals','order=created_at.desc')),
    safe(()=>supa('chantiers','order=created_at.desc')),
    safe(()=>supa('tresorerie','order=created_at.desc')),
    safe(()=>supa('memoire_fragments','order=created_at.desc')),
    safe(()=>supa('memoire_bible','order=thematique')),
    safe(()=>supa('skills','order=categorie,nom')),
    safe(()=>supa('prospects','order=created_at.asc'))
  ]);
  data.taches=taches;data.taches_v2=taches_v2;data.rec_suivi=rec_suivi;data.deals=deals;
  data.chantiers=chantiers;data.tresorerie=tresorerie;data.fragments=fragments;data.bible=bible;data.skills=skills;data.prospects=prospects;
  try{localStorage.setItem('iris_h_cache',JSON.stringify({data:{...data,contacts:[]},ts:Date.now()}))}catch(e){}
  render();
  const t=new Date();
  document.getElementById('refresh-time-sb').textContent=`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
  loadCRMContacts();
}

async function loadCRMContacts(){
  if(!cfg)return;
  try{
    const hdr={'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json','Prefer':'count=exact'};
    const countRes=await fetch(`${cfg.url}/rest/v1/contacts?limit=1&offset=0`,{headers:hdr});
    const total=parseInt(countRes.headers.get('content-range')?.split('/')[1]||'0');
    data.contacts=[];data._crmTotal=total;
    document.getElementById('nav-crm-cnt').textContent=total.toLocaleString();
    if(currentTab==='crm'){renderCRM()}
  }catch(e){console.warn('CRM count:',e)}
}

function render(){
  updateNavCounts();
  renderCurrentTab();
}

function updateNavCounts(){
  const tv2=data.taches_v2.filter(t=>(t.type_tache||'classique')==='classique'&&t.statut!=='fait');
  document.getElementById('nav-todo-cnt').textContent=tv2.length;
  document.getElementById('nav-deals-cnt').textContent=data.deals.filter(d=>!['cloture','dead'].includes(d.etape)).length;
  document.getElementById('nav-crm-cnt').textContent=(data._crmTotal||data.contacts.length).toLocaleString();
}

let currentTab='todo';
function switchTab(btn,tab){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  currentTab=tab;
  const titles={todo:'Todo',deals:'Dealflow Projets',prospects:'Dealflow Prospects',finance:'Finance',crm:'CRM',memoire:'Mémoire IA'};
  document.getElementById('topbar-title').textContent=titles[tab]||tab;
  renderCurrentTab();
  updateTopbar();
}

function renderCurrentTab(){
  const m={todo:renderTodo,deals:renderDeals,prospects:renderProspects,finance:renderFinance,crm:renderCRM,memoire:renderMemoire};
  if(m[currentTab])m[currentTab]();
}

function updateTopbar(){
  const r=document.getElementById('topbar-right');
  if(currentTab==='todo'){
    r.innerHTML=`<select class="top-btn" onchange="switchTodoMode(this.value)" id="todo-mode-sel"><option value="classique">Classique</option><option value="recurrente">Récurrente</option></select>
    <button class="top-btn warn" id="btn-attentes" onclick="toggleAttentes(this)">Attentes (${data.taches_v2.filter(t=>t.attente_de).length})</button>
    <button class="top-btn accent" onclick="loadAll()">Actualiser</button>`;
  }else{
    r.innerHTML=`<button class="top-btn accent" onclick="loadAll()">Actualiser</button>`;
  }
}

// ════════════════════════════════════════
// GLOBAL SEARCH
// ════════════════════════════════════════
function globalSearch(q){
  const el=document.getElementById('global-results');
  if(!q||q.length<2){el.style.display='none';return}
  const ql=q.toLowerCase();
  let results=[];
  data.contacts.filter(c=>[c.prenom,c.nom,c.email,c.societe,c.metier,c.telephone].filter(Boolean).join(' ').toLowerCase().includes(ql)).slice(0,5).forEach(c=>results.push({type:'contact',label:`${c.prenom||''} ${c.nom||''}`.trim(),sub:c.email||c.societe||'',tab:'crm'}));
  data.taches_v2.filter(t=>[t.titre,t.description,t.entite,t.projet].filter(Boolean).join(' ').toLowerCase().includes(ql)).slice(0,5).forEach(t=>results.push({type:'tâche',label:t.titre,sub:t.entite||'',tab:'todo'}));
  data.deals.filter(d=>[d.nom,d.entite,d.type].filter(Boolean).join(' ').toLowerCase().includes(ql)).slice(0,3).forEach(d=>results.push({type:'deal',label:d.nom,sub:d.entite||'',tab:'deals'}));
  if(!results.length){el.style.display='none';return}
  el.style.display='block';
  el.innerHTML=results.map(r=>`<div class="gr-item" onclick="document.querySelector('.nav-item[onclick*=\\'${r.tab}\\']').click()"><span class="gr-type">${r.type}</span><strong>${r.label}</strong> <span style="color:var(--dim)">${r.sub}</span></div>`).join('');
}

// ════════════════════════════════════════
// TODO
// ════════════════════════════════════════
let todoFilterE='all',todoFilterS='all',todoFilterCode='all',todoFilterPrio='all',todoMode='classique',todoAttentes=false;
let todoSortCol='priorite',todoSortDir='asc';

function sortTodo(col){if(todoSortCol===col)todoSortDir=todoSortDir==='asc'?'desc':'asc';else{todoSortCol=col;todoSortDir='asc'}renderTodo()}

function switchTodoMode(m){todoMode=m;renderTodo()}
function toggleAttentes(btn){todoAttentes=!todoAttentes;btn.style.background=todoAttentes?'var(--orange-bg)':'';renderTodo()}
function goToTodoForDeal(code){
  todoFilterCode=code;todoFilterE='all';todoFilterS='all';todoAttentes=false;todoMode='classique';
  const todoBtn=document.querySelector('.nav-item[onclick*="todo"]');
  if(todoBtn) switchTab(todoBtn,'todo');
}

function renderTodo(){
  if(todoMode==='recurrente'){renderTodoRec();return}
  const src=(data.taches_v2||[]).filter(t=>(t.type_tache||'classique')==='classique');
  const urgentes=src.filter(t=>t.priorite==='urgente'&&t.statut!=='fait').length;
  const attentes=src.filter(t=>t.attente_de).length;
  const actives=src.filter(t=>t.statut!=='fait').length;
  const faites=src.filter(t=>t.statut==='fait').length;

  // Mini histogramme par entité
  const byEntite={};src.filter(t=>t.statut!=='fait').forEach(t=>{byEntite[t.entite||'Autre']=(byEntite[t.entite||'Autre']||0)+1});
  const entColors={'IRIS H':'#c8a455',Perso:'#888',BYM:'#5B9BD5','Urban Rise':'#a78bfa','IRIS REP':'#c8a455',ARRISTO:'#fb923c','Galerie Carrez':'#22d3ee','C2C.FR':'#2C3E50',Autre:'#666'};
  const miniBarHtml=Object.entries(byEntite).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin-bottom:2px"><span style="width:70px;text-align:right;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${k}</span><div style="height:8px;width:${Math.max(8,v/Math.max(...Object.values(byEntite))*80)}px;background:${entColors[k]||'#666'};border-radius:3px"></div><span style="color:var(--dim);font-weight:600">${v}</span></div>`).join('');

  document.getElementById('todo-kpis').style.gridTemplateColumns='repeat(5,1fr)';
  document.getElementById('todo-kpis').innerHTML=`
    <div class="kpi red" style="cursor:pointer" onclick="todoFilterS='all';todoAttentes=false;todoFilterE='all';todoFilterCode='all';todoFilterPrio='urgente';renderTodo()"><div class="kpi-label">Urgentes</div><div class="kpi-val">${urgentes}</div><div class="kpi-sub">à traiter</div></div>
    <div class="kpi orange" style="cursor:pointer" onclick="todoAttentes=true;todoFilterS='all';todoFilterE='all';todoFilterCode='all';todoFilterPrio='all';renderTodo()"><div class="kpi-label">En attente</div><div class="kpi-val">${attentes}</div><div class="kpi-sub">tiers à relancer</div></div>
    <div class="kpi" style="cursor:pointer" onclick="todoFilterS='all';todoAttentes=false;todoFilterE='all';todoFilterCode='all';todoFilterPrio='all';renderTodo()"><div class="kpi-label">Actives</div><div class="kpi-val">${actives}</div><div class="kpi-sub">a_faire + en_cours</div></div>
    <div class="kpi green" style="cursor:pointer" onclick="todoFilterS='fait';todoAttentes=false;todoFilterE='all';todoFilterCode='all';todoFilterPrio='all';renderTodo()"><div class="kpi-label">Complétées</div><div class="kpi-val">${faites}</div><div class="kpi-sub">terminées</div></div>
    <div class="kpi" style="min-width:160px"><div class="kpi-label">Par entité</div><div style="margin-top:6px">${miniBarHtml}</div></div>`;

  document.getElementById('todo-charts').innerHTML='';

  // Filters
  const ents=['all','IRIS H','Perso','BYM','Urban Rise','IRIS REP','ARRISTO','Galerie Carrez','C2C.FR','Autre'];
  const codes=['all',...[...new Set(src.map(t=>t.code_projet).filter(Boolean))].sort()];
  document.getElementById('todo-filters').innerHTML=`
    ${todoFilterCode!=='all'?`<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px"><span class="pill p-iris" style="font-size:12px">Projet : ${todoFilterCode}</span><button class="fbtn" onclick="todoFilterCode='all';renderTodo()" style="font-size:10px">✕ Retirer filtre</button></div>`:''}
    <div class="filters">${ents.map(e=>`<button class="fbtn${todoFilterE===e?' on':''}" onclick="todoFilterE='${e}';renderTodo()">${e==='all'?'Toutes':e}</button>`).join('')}</div>
    ${codes.length>1?`<div class="filters">${codes.map(c=>`<button class="fbtn${todoFilterCode===c?' on':''}" onclick="todoFilterCode='${c}';renderTodo()">${c==='all'?'Tous projets':c}</button>`).join('')}</div>`:''}`;

  let filtered=src.slice();
  if(todoAttentes)filtered=filtered.filter(t=>t.attente_de);
  if(todoFilterE!=='all')filtered=filtered.filter(t=>t.entite===todoFilterE);
  if(todoFilterS!=='all')filtered=filtered.filter(t=>t.statut===todoFilterS);
  if(todoFilterCode!=='all')filtered=filtered.filter(t=>t.code_projet===todoFilterCode);
  if(todoFilterPrio!=='all')filtered=filtered.filter(t=>t.priorite===todoFilterPrio&&t.statut!=='fait');
  const pOrd={urgente:0,haute:1,moyenne:2,standby:3,fait:4};
  const sOrd={a_faire:0,en_cours:1,fait:2};
  const tDir=todoSortDir==='asc'?1:-1;
  filtered.sort((a,b)=>{
    let va,vb;
    if(todoSortCol==='priorite'){va=pOrd[a.priorite]??9;vb=pOrd[b.priorite]??9}
    else if(todoSortCol==='statut'){va=sOrd[a.statut]??9;vb=sOrd[b.statut]??9}
    else if(todoSortCol==='echeance'||todoSortCol==='derniere_relance'){va=a[todoSortCol]||'9999';vb=b[todoSortCol]||'9999'}
    else{va=(a[todoSortCol]||'').toString().toLowerCase();vb=(b[todoSortCol]||'').toString().toLowerCase()}
    return va<vb?-1*tDir:va>vb?1*tDir:0;
  });

  document.getElementById('todo-count').textContent=`${filtered.length} / ${src.length} tâches${todoAttentes?' (attentes)':''}`;
  const el=document.getElementById('todo-body');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-ico">✅</div><div class="empty-text">Aucune tâche</div></div>';return}

  const eBadge=e=>{const m={'IRIS H':'p-iris',Perso:'p-infra',BYM:'p-bym','Urban Rise':'p-ur','IRIS REP':'p-iris',ARRISTO:'p-arristo','Galerie Carrez':'p-gc','C2C.FR':'p-c2c'};return e?`<span class="pill ${m[e]||'p-iris'}">${e}</span>`:''};
  const pBadge=p=>{const m={urgente:'p-urg',haute:'p-high',moyenne:'p-med',standby:'p-standby',fait:'p-done'};const l={urgente:'Urgent',haute:'Haute',moyenne:'Moyenne',standby:'Standby',fait:'Fait'};return`<span class="pill ${m[p]||'p-med'}">${l[p]||p}</span>`};
  const sLabel=s=>({a_faire:'A faire',en_cours:'En cours',fait:'Fait'}[s]||s);
  const fDate=d=>{if(!d)return'';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})};
  const dCls=d=>{if(!d)return'';const days=Math.round((new Date(d)-Date.now())/864e5);return days<0?'color:var(--red)':days<=3?'color:var(--orange)':'color:var(--dim)'};
  const thS=k=>{let s='';if(todoSortCol===k)s=todoSortDir==='asc'?' ▲':' ▼';return s};

  el.innerHTML=`<table class="tbl"><thead><tr><th style="width:24px"></th><th>Tâche</th><th style="cursor:pointer" onclick="sortTodo('code_projet')">Code${thS('code_projet')}</th><th style="cursor:pointer" onclick="sortTodo('projet')">Projet${thS('projet')}</th><th style="cursor:pointer" onclick="sortTodo('entite')">Entité${thS('entite')}</th><th style="cursor:pointer" onclick="sortTodo('priorite')">Priorité${thS('priorite')}</th><th style="cursor:pointer" onclick="sortTodo('statut')">Statut${thS('statut')}</th><th style="cursor:pointer" onclick="sortTodo('echeance')">Échéance${thS('echeance')}</th><th style="cursor:pointer" onclick="sortTodo('attente_de')">Attente de${thS('attente_de')}</th><th style="cursor:pointer" onclick="sortTodo('derniere_relance')">Relancé le${thS('derniere_relance')}</th><th style="width:30px"></th></tr></thead><tbody>
  ${filtered.map(t=>{
    const sCls=t.statut==='fait'?'color:var(--green)':t.statut==='en_cours'?'color:var(--blue)':'color:var(--dim)';
    return`<tr><td style="text-align:center;font-size:12px;color:var(--dim)">${t.prerequis_titre?`<span title="← ${t.prerequis_titre}" style="cursor:pointer">◀</span>`:''}</td><td><div class="td-name" style="display:flex;align-items:center;gap:6px">${t.detail?'<span style="color:var(--blue);font-size:10px" title="Détail renseigné">●</span>':''}<span>${t.titre}</span></div><div style="font-size:10px;color:var(--dim)">${t.description||''}</div></td><td style="font-size:11px"><span class="pill p-iris" style="font-size:9px;cursor:pointer" onclick="event.stopPropagation();todoFilterCode='${t.code_projet||''}';renderTodo()">${t.code_projet||''}</span></td><td style="font-size:11px;color:var(--dim)">${t.projet||''}</td><td>${eBadge(t.entite)}</td><td>${pBadge(t.priorite)}</td><td style="${sCls};font-size:11px">${sLabel(t.statut)}</td><td style="${dCls(t.echeance)};font-size:11px">${fDate(t.echeance)}</td><td>${t.attente_de?`<span class="pill p-att">${t.attente_de}</span>`:''}</td><td style="font-size:10px;color:var(--dim)">${t.derniere_relance?fDate(t.derniere_relance):''}</td><td style="text-align:center"><button onclick="openTaskDetail('${t.id}')" style="width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--blue);cursor:pointer;font-size:14px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;transition:.12s" onmouseover="this.style.background='var(--blue)';this.style.color='#fff'" onmouseout="this.style.background='var(--card)';this.style.color='var(--blue)'">+</button></td></tr>`}).join('')}</tbody></table>`;
}

function renderTodoRec(){
  const src=(data.taches_v2||[]).filter(t=>t.type_tache==='recurrente');
  const suivi=data.rec_suivi||[];
  const weeks=['S1','S2','S3','S4','S5','S6','S7','S8','S9','S10','S11','S12'];
  document.getElementById('todo-kpis').innerHTML='';
  document.getElementById('todo-charts').innerHTML='';
  document.getElementById('todo-filters').innerHTML='';
  document.getElementById('todo-count').textContent=`${src.length} tâches récurrentes`;
  const el=document.getElementById('todo-body');
  if(!src.length){el.innerHTML='<div class="empty"><div class="empty-ico">🔄</div><div class="empty-text">Aucune tâche récurrente</div></div>';return}
  const eBadge=e=>{const m={'IRIS H':'p-iris',Perso:'p-infra',BYM:'p-bym','Urban Rise':'p-ur','IRIS REP':'p-iris',ARRISTO:'p-arristo'};return e?`<span class="pill ${m[e]||'p-iris'}">${e}</span>`:''};
  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Tâche</th><th>Entité</th>${weeks.map(w=>`<th style="width:34px;text-align:center">${w}</th>`).join('')}</tr></thead><tbody>
  ${src.map(t=>{const ts=suivi.filter(s=>s.tache_id===t.id);return`<tr><td><div class="td-name">${t.titre}</div><div style="font-size:10px;color:var(--dim)">${t.description||''}</div></td><td>${eBadge(t.entite)}</td>${weeks.map(w=>{const e=ts.find(s=>s.semaine===w);const ok=e&&e.fait;return`<td style="text-align:center;font-size:14px;color:${ok?'var(--green)':'var(--dim2)'}">${ok?'✓':'○'}</td>`}).join('')}</tr>`}).join('')}</tbody></table></div>`;
}

// CRM

let crmF={entite:'all',statut:'all',metier:'all',loc:'all'},crmPage=0;
const CRM_PS=100;

function renderCRM(){
  const total=data._crmTotal||0;
  document.getElementById('crm-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">Total contacts</div><div class="kpi-val">${total.toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-label">Chargement</div><div class="kpi-val">serveur</div><div class="kpi-sub">pagination API</div></div>`;
  document.getElementById('crm-charts').innerHTML='';

    <div class="filters">${stats.map(s=>`<button class="fbtn${crmF.statut===s?' on':''}" onclick="crmF.statut='${s}';crmPage=0;loadCRMTable()">${s==='all'?'Tous statuts':s}</button>`).join('')}</div>
    <div class="filters">${metiers.map(m=>`<button class="fbtn${crmF.metier===m?' on':''}" onclick="crmF.metier='${m.replace(/'/g,"\\'")}';crmPage=0;loadCRMTable()">${m==='all'?'Tous métiers':m}</button>`).join('')}</div>
    <div class="filters">${locs.map(l=>`<button class="fbtn${crmF.loc===l?' on':''}" onclick="crmF.loc='${l}';crmPage=0;loadCRMTable()">${l==='all'?'Toutes villes':l}</button>`).join('')}</div>`;
  loadCRMTable();

let crmST=null;
async function loadCRMTable(){
  if(!cfg)return;
  const el=document.getElementById('crm-body');
  el.innerHTML='<div class="empty"><div class="empty-text" style="color:var(--dim)">Chargement contacts...</div></div>';
  let params='order=nom.asc.nullslast';
  const search=(document.getElementById('crm-search')?.value||'').trim();
  if(crmF.entite!=='all') params+=`&entite_iris=cs.{"${crmF.entite}"}`;
  if(crmF.statut!=='all') params+=`&statut_relation=eq.${encodeURIComponent(crmF.statut)}`;
  if(crmF.metier!=='all') params+=`&metier=eq.${encodeURIComponent(crmF.metier)}`;
  if(crmF.loc!=='all') params+=`&localisation=like.*${encodeURIComponent(crmF.loc)}*`;
  if(search){const s=encodeURIComponent(`%${search}%`);params+=`&or=(nom.ilike.${s},prenom.ilike.${s},societe.ilike.${s},email.ilike.${s},metier.ilike.${s},localisation.ilike.${s},telephone.ilike.${s})`}
  const offset=crmPage*CRM_PS;
  try{
    const hdr={'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json','Prefer':'count=exact'};
    const[countRes,pageRes]=await Promise.all([
      fetch(`${cfg.url}/rest/v1/contacts?${params}&limit=1&offset=0`,{headers:hdr}),
      fetch(`${cfg.url}/rest/v1/contacts?${params}&limit=${CRM_PS}&offset=${offset}`,{headers:{'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json'}})
    ]);
    const fTotal=parseInt(countRes.headers.get('content-range')?.split('/')[1]||'0');
    const pg=await pageRes.json();
    const mx=Math.max(0,Math.ceil(fTotal/CRM_PS)-1);if(crmPage>mx)crmPage=mx;
    document.getElementById('crm-count').textContent=`${fTotal} / ${data._crmTotal||fTotal} contacts`;
    if(!pg.length){el.innerHTML='<div class="empty"><div class="empty-ico">👥</div><div class="empty-text">Aucun contact</div></div>';return}
    const eBadge=ei=>{if(!ei||!ei.length)return'';const m={BYM:'p-bym','Urban Rise':'p-ur','IRIS REP':'p-iris',ARRISTO:'p-arristo','Galerie Carrez':'p-gc','IRIS H':'p-iris'};return(Array.isArray(ei)?ei:[ei]).map(e=>`<span class="pill ${m[e]||'p-iris'}">${e}</span>`).join(' ')};
    const sBadge=s=>{const m={prospect:'p-med',contacté:'p-high',qualifié:'p-ur',actif:'p-done',inactif:'p-standby'};return s?`<span class="pill ${m[s]||'p-med'}">${s}</span>`:''};
    const pager=`<div class="pager"><span>${offset+1} à ${Math.min(offset+CRM_PS,fTotal)} sur ${fTotal}</span><div class="pager-btns"><button onclick="crmPage=0;loadCRMTable()" ${!crmPage?'disabled':''}>⟨⟨</button><button onclick="crmPage--;loadCRMTable()" ${!crmPage?'disabled':''}>⟨</button><span style="padding:0 8px">${crmPage+1}/${mx+1}</span><button onclick="crmPage++;loadCRMTable()" ${crmPage>=mx?'disabled':''}>⟩</button><button onclick="crmPage=${mx};loadCRMTable()" ${crmPage>=mx?'disabled':''}>⟩⟩</button></div></div>`;
    el.innerHTML=pager+`<table class="tbl"><thead><tr><th>Prénom</th><th>Nom</th><th>Métier</th><th>Société</th><th>Localisation</th><th>Statut</th><th>Entité</th><th>Email</th><th>Tél</th></tr></thead><tbody>
    ${pg.map(c=>`<tr><td class="td-name">${c.prenom||''}</td><td class="td-name">${c.nom||''}</td><td>${c.metier||''}</td><td>${c.societe||''}</td><td>${c.localisation||''}</td><td>${sBadge(c.statut_relation)}</td><td>${eBadge(c.entite_iris)}</td><td>${c.email?`<a class="td-link" href="mailto:${c.email}">${c.email}</a>`:''}</td><td>${c.telephone?`<a class="td-link" href="tel:${c.telephone}">${c.telephone}</a>`:''}</td></tr>`).join('')}</tbody></table>`+pager;
  }catch(e){console.warn('CRM:',e);el.innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-text">Erreur chargement contacts</div></div>'}
}

const ETAPES=[{key:'sourcing',label:'Sourcing'},{key:'analyse',label:'Analyse'},{key:'nego',label:'Négo'},{key:'offre',label:'Offre'},{key:'compromis',label:'Compromis'},{key:'acte',label:'Acte'},{key:'travaux',label:'Travaux'},{key:'commercialisation',label:'Commerc.'},{key:'to_sell',label:'To Sell'},{key:'cloture',label:'Clôture'},{key:'dead',label:'Dead'}];
const ETAPE_ORDER={};ETAPES.forEach((e,i)=>ETAPE_ORDER[e.key]=i);
const ETAPE_LABEL={};ETAPES.forEach(e=>ETAPE_LABEL[e.key]=e.label);
const DT={acquisition:'🏠',vente:'💰',chantier:'🏗️',mandat:'🤝',montage:'📐',appel_offres:'📋',gestion:'🔑',chantier_bym:'🏗️',conseil_iris:'🤝'};
const DL={acquisition:'Acquisition',vente:'Vente',chantier:'Chantier',mandat:'Mandat',montage:'Montage',appel_offres:'AO',gestion:'Gestion',chantier_bym:'Chantier',conseil_iris:'Conseil'};
let dealsFilter='all',dealsSortCol='etape',dealsSortDir='asc';
function filterDeals(btn,v){document.querySelectorAll('.deals-fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');dealsFilter=v;renderDeals()}
function sortDeals(c){if(dealsSortCol===c)dealsSortDir=dealsSortDir==='asc'?'desc':'asc';else{dealsSortCol=c;dealsSortDir='asc'}renderDeals()}
function fmt(n){if(!n)return'';if(n>=1e6)return(n/1e6).toFixed(1)+'M€';if(n>=1e3)return Math.round(n/1e3)+'K€';return n+'€'}

function renderDeals(){
  let deals=dealsFilter==='all'?[...data.deals]:data.deals.filter(d=>d.entite===dealsFilter);
  const dir=dealsSortDir==='asc'?1:-1;
  deals.sort((a,b)=>{let va,vb;if(dealsSortCol==='etape'){va=ETAPE_ORDER[a.etape]??99;vb=ETAPE_ORDER[b.etape]??99}else if(['montant','ca_previ','resultat_previ'].includes(dealsSortCol)){va=a[dealsSortCol]||0;vb=b[dealsSortCol]||0}else{va=(a[dealsSortCol]||'').toString().toLowerCase();vb=(b[dealsSortCol]||'').toString().toLowerCase()}return va<vb?-1*dir:va>vb?1*dir:0});
  const actifs=deals.filter(d=>!['cloture','dead'].includes(d.etape));
  const vol=actifs.reduce((a,d)=>a+(d.montant||0),0);
  const totalCA=deals.reduce((s,d)=>s+(d.ca_previ||0),0);
  const enTravaux=deals.filter(d=>d.etape==='travaux').length;
  document.getElementById('deals-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">Deals actifs</div><div class="kpi-val">${actifs.length}</div></div>
    <div class="kpi"><div class="kpi-label">Volume total</div><div class="kpi-val">${fmt(vol)||'N/A'}</div></div>
    <div class="kpi"><div class="kpi-label">CA prévi</div><div class="kpi-val">${fmt(totalCA)||'N/A'}</div></div>
    <div class="kpi"><div class="kpi-label">En travaux</div><div class="kpi-val">${enTravaux}</div></div>`;
  const eBadge=e=>{const m={BYM:'p-bym',URBAN_RISE:'p-ur',IRIS_REP:'p-iris',ARRISTO:'p-arristo',IRIS_H:'p-iris',GALERIE_CARREZ:'p-gc'};const l={BYM:'BYM',URBAN_RISE:'Urban Rise',IRIS_REP:'IRIS REP',ARRISTO:'ARRISTO',IRIS_H:'IRIS H',GALERIE_CARREZ:'Galerie Carrez'};return`<span class="pill ${m[e]||'p-iris'}">${l[e]||e||''}</span>`};
  const etBadge=et=>{const st={dead:'background:#f8717118;color:#f87171;border:1px solid #f8717140',to_sell:'background:#fb923c18;color:#fb923c;border:1px solid #fb923c40',cloture:'background:#41c98e18;color:#41c98e;border:1px solid #41c98e40'};return`<span class="pill" style="font-size:9px;${st[et]||''}">${ETAPE_LABEL[et]||et||''}</span>`};
  const cols=[{k:'code',l:'Code'},{k:'nom',l:'Nom'},{k:'entite',l:'Entité'},{k:'type',l:'Type'},{k:'etape',l:'Étape'},{k:'montant',l:'Montant'},{k:'ca_previ',l:'CA Prévi'},{k:'resultat_previ',l:'Résultat'},{k:'adresse',l:'Adresse'},{k:'commentaire',l:'Commentaire'}];
  const filtersHtml=`<div class="filters" style="margin-bottom:12px"><button class="fbtn deals-fbtn${dealsFilter==='all'?' on':''}" onclick="filterDeals(this,'all')">Tous</button><button class="fbtn deals-fbtn${dealsFilter==='BYM'?' on':''}" onclick="filterDeals(this,'BYM')">BYM</button><button class="fbtn deals-fbtn${dealsFilter==='URBAN_RISE'?' on':''}" onclick="filterDeals(this,'URBAN_RISE')">Urban Rise</button><button class="fbtn deals-fbtn${dealsFilter==='IRIS_REP'?' on':''}" onclick="filterDeals(this,'IRIS_REP')">IRIS REP</button><button class="fbtn deals-fbtn${dealsFilter==='ARRISTO'?' on':''}" onclick="filterDeals(this,'ARRISTO')">ARRISTO</button><button class="fbtn deals-fbtn${dealsFilter==='GALERIE_CARREZ'?' on':''}" onclick="filterDeals(this,'GALERIE_CARREZ')">Galerie Carrez</button></div>`;
  const entIco=e=>({BYM:'🏗️',URBAN_RISE:'🏠',IRIS_REP:'🔍',ARRISTO:'🤝',IRIS_H:'🏛️',GALERIE_CARREZ:'🎨'}[e]||'📋');
  document.getElementById('deals-body').innerHTML=filtersHtml+`<table class="tbl"><thead><tr>${cols.map(c=>{let cls='';if(dealsSortCol===c.k)cls=dealsSortDir==='asc'?' ▲':' ▼';return`<th style="cursor:pointer" onclick="sortDeals('${c.k}')">${c.l}${cls}</th>`}).join('')}</tr></thead><tbody>
  ${deals.length?deals.map(d=>`<tr><td><a href="#" onclick="goToTodoForDeal('${d.code||''}');return false" style="color:var(--blue);font-weight:600;text-decoration:none;font-size:12px" title="Voir les tâches ${d.code}">${d.code||''}</a></td><td class="td-name">${entIco(d.entite)} ${d.nom||''}</td><td>${eBadge(d.entite)}</td><td>${DL[d.type]||d.type||''}</td><td>${etBadge(d.etape)}</td><td style="color:var(--green);font-weight:500">${fmt(d.montant)}</td><td style="color:var(--blue)">${fmt(d.ca_previ)}</td><td style="color:var(--green)">${fmt(d.resultat_previ)}</td><td>${d.adresse||''}</td><td style="font-size:10px;color:var(--dim);font-style:italic;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(d.commentaire||'').replace(/"/g,'&quot;')}">${d.commentaire||''}</td></tr>`).join(''):`<tr><td colspan="${cols.length}" style="text-align:center;padding:2rem;color:var(--dim)">Aucun deal</td></tr>`}
  </tbody></table>`;
}

let prospectsFilter='all';
function filterProspects(btn,v){document.querySelectorAll('.prosp-fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');prospectsFilter=v;renderProspects()}

async function renderProspects(){
  let allPros=[...data.prospects];
  // Tri : ordre d'ajout, sauf "A creuser" avant dernier et "dead" en dernier
  const sortKey=p=>p.nom_entreprise==='Useless'||p.statut==='dead'?2:p.nom_entreprise==='A creuser'?1:0;
  allPros.sort((a,b)=>{const ka=sortKey(a),kb=sortKey(b);if(ka!==kb)return ka-kb;return 0});
  const actifs=data.prospects.filter(p=>p.statut!=='dead').length;
  const enCours=data.prospects.filter(p=>p.statut==='en_cours').length;
  const valides=data.prospects.filter(p=>p.statut==='valide').length;
  document.getElementById('prospects-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">Total prospects</div><div class="kpi-val">${data.prospects.length}</div></div>
    <div class="kpi"><div class="kpi-label">En cours</div><div class="kpi-val">${enCours}</div></div>
    <div class="kpi green"><div class="kpi-label">Validés</div><div class="kpi-val">${valides}</div></div>
    <div class="kpi"><div class="kpi-label">Actifs</div><div class="kpi-val">${actifs}</div></div>`;
  document.getElementById('nav-prospects-cnt').textContent=actifs;

  const eMap={BYM:'p-bym',URBAN_RISE:'p-ur',IRIS_REP:'p-iris',ARRISTO:'p-arristo',GALERIE_CARREZ:'p-gc','IRIS REP':'p-iris'};
  const eLabel={BYM:'BYM',URBAN_RISE:'Urban Rise',IRIS_REP:'IRIS REP',ARRISTO:'ARRISTO',GALERIE_CARREZ:'Galerie Carrez','IRIS REP':'IRIS REP'};
  const eBadge=e=>`<span class="pill ${eMap[e]||'p-iris'}">${eLabel[e]||e||''}</span>`;
  const csBadge=s=>{const m={a_prospecter:'background:var(--blue-bg);color:var(--blue)',en_cours:'background:var(--orange-bg);color:#b36d00',a_relancer:'background:#fce4ec;color:#c62828',valide:'background:var(--green-bg);color:#1a8a4a',dead:'background:#f5f5f5;color:#999'};const l={a_prospecter:'A prospecter',en_cours:'En cours',a_relancer:'A relancer',valide:'Validé',dead:'Dead'};return`<span class="pill" style="font-size:9px;${m[s]||''}">${l[s]||s||''}</span>`};
  const psBadge=s=>{const m={a_prospecter:'var(--blue-bg)',en_cours:'var(--orange-bg)',a_relancer:'#fce4ec',valide:'var(--green-bg)',dead:'#f5f5f5'};const mc={a_prospecter:'var(--blue)',en_cours:'#b36d00',a_relancer:'#c62828',valide:'#1a8a4a',dead:'#999'};const l={a_prospecter:'A prospecter',en_cours:'En cours',a_relancer:'A relancer',valide:'Validé',dead:'Dead'};return`<span style="font-size:9px;color:${mc[s]||'var(--dim)'};background:${m[s]||'var(--bg)'};padding:2px 6px;border-radius:4px;white-space:nowrap">${l[s]||s||''}</span>`};
  const fDate=d=>{if(!d)return'';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})};

  const filtersHtml=`<div class="filters" style="margin-bottom:12px"><button class="fbtn prosp-fbtn${prospectsFilter==='all'?' on':''}" onclick="filterProspects(this,'all')">Tous</button><button class="fbtn prosp-fbtn${prospectsFilter==='BYM'?' on':''}" onclick="filterProspects(this,'BYM')">BYM</button><button class="fbtn prosp-fbtn${prospectsFilter==='IRIS_REP'?' on':''}" onclick="filterProspects(this,'IRIS_REP')">IRIS REP</button><button class="fbtn prosp-fbtn${prospectsFilter==='URBAN_RISE'?' on':''}" onclick="filterProspects(this,'URBAN_RISE')">Urban Rise</button><button class="fbtn prosp-fbtn${prospectsFilter==='ARRISTO'?' on':''}" onclick="filterProspects(this,'ARRISTO')">ARRISTO</button><button class="fbtn prosp-fbtn${prospectsFilter==='GALERIE_CARREZ'?' on':''}" onclick="filterProspects(this,'GALERIE_CARREZ')">Galerie Carrez</button></div>`;

  // Charger les liaisons prospect_contacts avec les infos contact
  const allRows=await Promise.all(allPros.map(async p=>{
    let pcs=[];
    try{
      pcs=await supa('prospect_contacts',`prospect_id=eq.${p.id}&order=is_principal.desc,created_at.asc&select=*`);
    }catch(e){}
    const enriched=await Promise.all(pcs.map(async pc=>{
      let contact={};
      try{
        const res=await supa('contacts',`id=eq.${pc.contact_id}&select=id,prenom,nom,email,telephone,entite_iris`);
        if(res.length)contact=res[0];
      }catch(e){}
      return{...pc,...contact,pc_role:pc.role,pc_statut:pc.statut,pc_principal:pc.is_principal,pc_entite:pc.entite,pc_last_call:pc.last_call};
    }));
    return{...p,pcs:enriched};
  }));

  // Filtrage par entité : on filtre les contacts de chaque prospect, et on masque les prospects sans contacts pertinents
  const ef=prospectsFilter;
  const entMatch=(entites,f)=>{
    if(!entites||!entites.length)return false;
    // Normaliser : "IRIS REP" et "IRIS_REP" doivent matcher
    const norm=s=>(s||'').replace(/\s+/g,'_').toUpperCase();
    return entites.some(e=>norm(e)===norm(f));
  };
  let rows;
  if(ef==='all'){
    rows=allRows;
  }else{
    rows=allRows.map(p=>{
      const filteredPcs=p.pcs.filter(c=>entMatch(c.entite_iris||[],ef));
      return{...p,pcs_filtered:filteredPcs};
    }).filter(p=>p.pcs_filtered.length>0||(p.entites||[]).some(e=>entMatch([e],ef)));
    // Utiliser pcs_filtered pour l'affichage
    rows=rows.map(p=>({...p,pcs:p.pcs_filtered||p.pcs}));
  }

  if(!rows.length){
    document.getElementById('prospects-body').innerHTML=filtersHtml+'<div class="empty"><div class="empty-ico">🔍</div><div class="empty-text">Aucun prospect pour cette entité</div></div>';return;
  }

  const logoCell=p=>{
    const special=['Useless','A creuser'];
    const icoEmoji=p.nom_entreprise==='Useless'?'🗑️':p.nom_entreprise==='A creuser'?'🔎':'🏢';
    const ico=p.type==='personne'
      ?`<div style="width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>`
      :special.includes(p.nom_entreprise)
        ?`<div style="width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px">${icoEmoji}</div>`
      :p.domaine_web
        ?`<img src="https://unavatar.io/${p.domaine_web}?fallback=false" onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=${p.domaine_web}&sz=64'" style="width:40px;height:40px;border-radius:10px;object-fit:contain;background:#fff;border:1px solid var(--border)">`
        :`<div style="width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px">🏢</div>`;
    const dpc=p.derniere_prise_contact?fDate(p.derniere_prise_contact):'<span style="color:var(--dim2)">non contacté</span>';
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">${ico}${psBadge(p.statut)}<div style="font-size:9px;color:var(--dim)">${dpc}</div></div>`;
  };

  const contactsBlock=pcs=>{
    if(!pcs.length)return'<span style="color:var(--dim);font-size:11px">Aucun contact lié</span>';
    return`<div style="max-height:220px;overflow-y:auto">${pcs.map(c=>{
      const principal=c.pc_principal;
      const nameStyle=principal?'font-weight:700;text-decoration:underline':'';
      const display=c.email||[c.prenom,c.nom].filter(Boolean).join(' ')||c.telephone||'Sans info';
      const roleStr=c.pc_role?` · ${c.pc_role}`:'';
      const ents=(c.entite_iris||[]);
      const entStr=ents.length?ents.map(e=>eBadge(e)).join(' '):'';
      const lcStr=c.pc_last_call?`<span style="font-size:9px;color:var(--dim);white-space:nowrap;margin-left:4px">${fDate(c.pc_last_call)}</span>`:'';
      return`<div style="display:flex;align-items:center;gap:5px;padding:2px 0;border-bottom:1px solid var(--bg)"><div style="flex:1;min-width:0;font-size:11px;${nameStyle};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${display}<span style="color:var(--dim);font-style:italic">${roleStr}</span></div>${entStr}${csBadge(c.pc_statut)}${lcStr}</div>`;
    }).join('')}</div>`;
  };

  const noteBtn=p=>{
    const hasNote=p.notes&&p.notes.trim();
    return`<button onclick="openProspectNote('${p.id}')" style="width:24px;height:24px;border-radius:6px;border:1px solid ${hasNote?'var(--blue)':'var(--border)'};background:${hasNote?'rgba(91,155,213,0.08)':'var(--card)'};color:var(--blue);cursor:pointer;font-size:14px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;transition:.12s" onmouseover="this.style.background='var(--blue)';this.style.color='#fff'" onmouseout="this.style.background='${hasNote?'rgba(91,155,213,0.08)':'var(--card)'}';this.style.color='var(--blue)'">${hasNote?'●':'+'}</button>`;
  };

  document.getElementById('prospects-body').innerHTML=filtersHtml+`<table class="tbl"><thead><tr><th style="width:80px"></th><th style="width:110px;text-align:center">Entreprise</th><th>Contacts CRM</th><th style="width:30px"></th></tr></thead><tbody>
  ${rows.map(p=>`<tr style="vertical-align:top"><td>${logoCell(p)}</td><td style="vertical-align:top;padding-top:10px;text-align:center"><div class="td-name" style="font-size:12px">${p.nom_entreprise||''}</div></td><td>${contactsBlock(p.pcs)}</td><td style="vertical-align:top;padding-top:10px;text-align:center">${noteBtn(p)}</td></tr>`).join('')}
  </tbody></table>`;
}

let currentProspectId=null;
function openProspectNote(id){
  const p=(data.prospects||[]).find(p=>p.id===id);
  if(!p)return;
  currentProspectId=id;
  document.getElementById('modal-prospect-title').textContent=p.nom_entreprise||'Prospect';
  document.getElementById('modal-prospect-note').value=p.notes||'';
  document.getElementById('modal-prospect-loading').style.display='none';
  document.getElementById('modal-prospect-save').disabled=false;
  document.getElementById('prospect-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-prospect-note').focus(),100);
}
function closeProspectModal(){
  document.getElementById('prospect-modal').classList.remove('open');
  currentProspectId=null;
}
async function saveProspectNote(){
  if(!currentProspectId||!cfg)return;
  const notes=document.getElementById('modal-prospect-note').value;
  const loading=document.getElementById('modal-prospect-loading');
  const btn=document.getElementById('modal-prospect-save');
  loading.style.display='block';btn.disabled=true;
  try{
    await fetch(`${cfg.url}/rest/v1/prospects?id=eq.${currentProspectId}`,{
      method:'PATCH',
      headers:{'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json'},
      body:JSON.stringify({notes})
    });
    const p=(data.prospects||[]).find(p=>p.id===currentProspectId);
    if(p)p.notes=notes;
    closeProspectModal();
    renderProspects();
  }catch(e){
    loading.textContent='Erreur, réessaie';
  }finally{
    loading.style.display='none';btn.disabled=false;
  }
}

// ════════════════════════════════════════
function renderFinance(){
  const entites=['BYM','URBAN_RISE','IRIS_REP'];const labels={BYM:'BYM',URBAN_RISE:'Urban Rise',IRIS_REP:'IRIS REP'};
  let tIn=0,tOut=0;
  entites.forEach(e=>{const rows=data.tresorerie.filter(t=>t.entite===e);tIn+=rows.filter(r=>r.type==='entrant').reduce((a,r)=>a+r.montant,0);tOut+=rows.filter(r=>r.type==='sortant').reduce((a,r)=>a+r.montant,0)});
  const net=tIn-tOut;
  const ch=data.chantiers.filter(c=>c.budget_initial>0);
  const avgPct=ch.length?Math.round(ch.reduce((a,c)=>a+c.budget_realise/c.budget_initial*100,0)/ch.length):0;

  document.getElementById('fin-kpis').innerHTML=`
    <div class="kpi green"><div class="kpi-label">Total entrant</div><div class="kpi-val">${fmt(tIn)}</div></div>
    <div class="kpi red"><div class="kpi-label">Total sortant</div><div class="kpi-val">${fmt(tOut)}</div></div>
    <div class="kpi ${net>=0?'green':'red'}"><div class="kpi-label">Tréso nette</div><div class="kpi-val">${net>=0?'+':''}${fmt(Math.abs(net))}</div></div>
    <div class="kpi"><div class="kpi-label">Budget moyen</div><div class="kpi-val">${avgPct}%</div><div class="kpi-sub">${ch.length} chantier${ch.length>1?'s':''}</div></div>`;

  const sections=['budget','treso','synth'];const sLabels={budget:'Budget Chantiers',treso:'Trésorerie',synth:'Synthèse'};
  document.getElementById('fin-nav').innerHTML=sections.map((s,i)=>`<button class="fin-nav-btn${i===0?' active':''}" onclick="document.querySelectorAll('.fin-section').forEach(x=>x.classList.remove('active'));document.getElementById('fin-${s}').classList.add('active');document.querySelectorAll('.fin-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${sLabels[s]}</button>`).join('');

  const eBadge=e=>{const m={BYM:'p-bym',URBAN_RISE:'p-ur',IRIS_REP:'p-iris'};const l={BYM:'BYM',URBAN_RISE:'Urban Rise',IRIS_REP:'IRIS REP'};return`<span class="pill ${m[e]||''}">${l[e]||e}</span>`};

  let html=`<div class="fin-section active" id="fin-budget"><div class="tcard">`;
  if(!ch.length)html+='<div class="empty"><div class="empty-text">Aucun chantier avec budget</div></div>';
  else html+=ch.map(c=>{const pct=Math.round(c.budget_realise/c.budget_initial*100);const cls=pct>90?'bfill-danger':pct>75?'bfill-warn':'bfill-ok';return`<div class="budget-row"><div class="budget-label"><span class="bname">${c.nom} ${eBadge(c.entite)}</span><span class="bpct" style="color:${pct>90?'var(--red)':pct>75?'var(--orange)':'var(--green)'}">${pct}%</span></div><div class="budget-bar"><div class="budget-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div><div class="budget-nums"><span>${fmt(c.budget_realise)} réalisé</span><span>Budget : ${fmt(c.budget_initial)}</span></div></div>`}).join('');
  html+=`</div></div>`;

  html+=`<div class="fin-section" id="fin-treso"><div class="tcard"><div class="treso-row" style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px"><span></span><span>Entrant</span><span>Sortant</span><span>Net</span></div>`;
  entites.forEach(e=>{const rows=data.tresorerie.filter(t=>t.entite===e);const ein=rows.filter(r=>r.type==='entrant').reduce((a,r)=>a+r.montant,0);const eout=rows.filter(r=>r.type==='sortant').reduce((a,r)=>a+r.montant,0);const n=ein-eout;html+=`<div class="treso-row"><span class="treso-entite">${labels[e]}</span><span class="treso-in">+${fmt(ein)||'0€'}</span><span class="treso-out">${fmt(eout)||'0€'}</span><span class="treso-net" style="color:${n>=0?'var(--green)':'var(--red)'}">${n>=0?'+':''}${fmt(Math.abs(n))}</span></div>`});
  html+=`</div></div>`;

  html+=`<div class="fin-section" id="fin-synth"><div class="tcard">
    <div class="synth-item"><div class="synth-label">Total entrant</div><div class="synth-value pos">${fmt(tIn)}</div></div>
    <div class="synth-item"><div class="synth-label">Total sortant</div><div class="synth-value neg">${fmt(tOut)}</div></div>
    <div class="synth-item"><div class="synth-label">Tréso nette</div><div class="synth-value ${net>=0?'pos':'neg'}">${net>=0?'+':''}${fmt(Math.abs(net))}</div></div>
    <div class="synth-item"><div class="synth-label">Deals actifs</div><div class="synth-value">${data.deals.filter(d=>d.etape!=='perdu').length}</div></div>
  </div></div>`;
  document.getElementById('fin-sections').innerHTML=html;
}

// ════════════════════════════════════════
// MEMOIRE
// ════════════════════════════════════════
const THEMES=[{key:'immobilier',label:'Immobilier',ico:'🏢'},{key:'finance',label:'Finance',ico:'💶'},{key:'chantiers',label:'Chantiers',ico:'🏗️'},{key:'contacts',label:'Contacts',ico:'👥'},{key:'juridique',label:'Juridique',ico:'⚖️'},{key:'dealflow',label:'Deal Flow',ico:'📊'}];
let activeTheme='immobilier',memoView='bible',fragFilter='all';

function renderMemoire(){
  document.getElementById('memo-toggle').innerHTML=`<button class="memo-toggle-btn${memoView==='bible'?' active':''}" onclick="memoView='bible';renderMemoire()">Bible consolidée</button><button class="memo-toggle-btn${memoView==='fragments'?' active':''}" onclick="memoView='fragments';renderMemoire()">Fragments bruts</button><button class="memo-toggle-btn${memoView==='skills'?' active':''}" onclick="memoView='skills';renderMemoire()">Skills agents</button>`;
  if(memoView==='bible')renderBible();else if(memoView==='fragments')renderFragments();else renderSkills();
  document.getElementById('memo-bible-view').style.display=memoView==='bible'?'block':'none';
  document.getElementById('memo-fragments-view').style.display=memoView==='fragments'?'block':'none';
  document.getElementById('memo-skills-view').style.display=memoView==='skills'?'block':'none';
}

function renderBible(){
  const el=document.getElementById('memo-bible-view');
  el.innerHTML=`<div class="memo-nav">${THEMES.map((t,i)=>`<button class="memo-nav-btn${activeTheme===t.key?' active':''}" onclick="activeTheme='${t.key}';renderBible()">${t.ico} ${t.label}</button>`).join('')}</div>
  ${THEMES.map(t=>{const e=data.bible.find(b=>b.thematique===t.key);const c=e?e.contenu:'';const maj=e?e.derniere_maj:null;const v=e?e.version:0;const fc=data.fragments.filter(f=>f.thematique===t.key).length;
  return`<div class="bible-chapter${activeTheme===t.key?' active':''}" id="bible-${t.key}"><div class="bible-content">${escHtml(c)}</div><div class="bible-meta"><span>${maj?'Maj : '+fmtDt(maj):'Jamais mis à jour'}${v?' · v'+v:''}</span><span>${fc} fragment${fc>1?'s':''}</span></div></div>`}).join('')}`;
}

function renderFragments(){
  const filtered=fragFilter==='all'?data.fragments:data.fragments.filter(f=>f.agent===fragFilter);
  const el=document.getElementById('memo-fragments-view');
  const agBadge=a=>{const m={claude:'p-iris',tom:'p-infra',neo:'p-ur'};const l={claude:'Claude',tom:'Tom',neo:'Neo'};return`<span class="pill ${m[a]||''}">${l[a]||a}</span>`};
  el.innerHTML=`<div class="filters"><button class="fbtn${fragFilter==='all'?' on':''}" onclick="fragFilter='all';renderFragments()">Tous</button><button class="fbtn${fragFilter==='claude'?' on':''}" onclick="fragFilter='claude';renderFragments()">Claude</button><button class="fbtn${fragFilter==='tom'?' on':''}" onclick="fragFilter='tom';renderFragments()">Tom</button><button class="fbtn${fragFilter==='neo'?' on':''}" onclick="fragFilter='neo';renderFragments()">Neo</button></div>
  ${filtered.length?filtered.map(f=>`<div class="fragment-item"><div class="fragment-header"><div>${agBadge(f.agent)} <span class="pill ${f.importance==='haute'?'p-urg':'p-med'}">${f.importance}</span></div><div class="fragment-date">${fmtDt(f.created_at)}</div></div><div class="fragment-text">${escHtml(f.contenu)}</div>${f.tags&&f.tags.length?`<div class="fragment-tags">${f.tags.map(t=>`<span class="fragment-tag">${t}</span>`).join('')}</div>`:''}</div>`).join(''):'<div class="empty"><div class="empty-ico">🧠</div><div class="empty-text">Aucun fragment</div></div>'}`;
}

function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function renderSkills(){
  const el=document.getElementById('memo-skills-view');
  const skills=data.skills||[];
  if(!skills.length){el.innerHTML='<div class="empty"><div class="empty-ico">⚡</div><div class="empty-text">Aucun skill enregistré</div></div>';return}
  const catPill={api:'p-infra',workflow:'p-done',contexte:'p-ur',template:'p-high',outil:'p-med'};
  const agBadge=a=>{const m={claude:'p-iris',tom:'p-infra',neo:'p-ur'};const l={claude:'Claude',tom:'Tom',neo:'Neo'};return`<span class="pill ${m[a]||''}">${l[a]||a}</span>`};
  el.innerHTML=`<div style="font-size:12px;color:var(--dim);margin-bottom:12px">${skills.length} skill${skills.length>1?'s':''} actif${skills.length>1?'s':''}</div>`+
    skills.map((s,i)=>{
      const agents=(s.agents||[]).map(a=>agBadge(a)).join(' ');
      return`<div class="tcard" style="margin-bottom:8px;padding:0;overflow:hidden">
        <div onclick="toggleSkill(${i})" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:10px;transition:background .12s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
            <span class="pill ${catPill[s.categorie]||'p-med'}">${s.categorie||'autre'}</span>
            <span style="font-weight:600;color:var(--navy)">${escHtml(s.nom)}</span>
            <span style="color:var(--dim);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(s.description||'')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            ${agents}
            <span style="color:var(--dim);font-size:11px">v${s.version||1}</span>
            <span id="skill-chev-${i}" style="color:var(--dim);transition:transform .15s;display:inline-block;font-size:10px">▸</span>
          </div>
        </div>
        <div id="skill-body-${i}" style="display:none;padding:0 16px 14px">
          <div style="font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:12px;max-height:300px;overflow-y:auto">${escHtml(s.contenu)}</div>
          <div class="bible-meta" style="margin-top:8px"><span>Mis à jour : ${fmtDt(s.updated_at)}</span></div>
        </div>
      </div>`}).join('');
}

function toggleSkill(i){
  const body=document.getElementById('skill-body-'+i);
  const chev=document.getElementById('skill-chev-'+i);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  chev.style.transform=open?'':'rotate(90deg)';
}
function fmtDt(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}

// ════════════════════════════════════════
// MODALE DETAIL TACHE
// ════════════════════════════════════════
let currentTaskId=null;

function openTaskDetail(id){
  const t=(data.taches_v2||[]).find(t=>t.id===id);
  if(!t)return;
  currentTaskId=id;
  document.getElementById('modal-task-title').textContent=t.titre;
  document.getElementById('modal-task-sub').textContent=[t.code_projet,t.entite,t.projet].filter(Boolean).join(' · ');
  document.getElementById('modal-task-detail').value=t.detail||'';
  document.getElementById('modal-loading').style.display='none';
  document.getElementById('modal-save-btn').disabled=false;
  document.getElementById('task-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-task-detail').focus(),100);
}

function closeTaskModal(){
  document.getElementById('task-modal').classList.remove('open');
  currentTaskId=null;
}

async function saveTaskDetail(){
  if(!currentTaskId||!cfg)return;
  const detail=document.getElementById('modal-task-detail').value;
  const loading=document.getElementById('modal-loading');
  const btn=document.getElementById('modal-save-btn');
  loading.style.display='block';btn.disabled=true;
  try{
    await fetch(`${cfg.url}/rest/v1/taches_v2?id=eq.${currentTaskId}`,{
      method:'PATCH',
      headers:{'apikey':cfg.key,'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json'},
      body:JSON.stringify({detail})
    });
    const t=(data.taches_v2||[]).find(t=>t.id===currentTaskId);
    if(t)t.detail=detail;
    closeTaskModal();
  }catch(e){
    console.warn('Save detail:',e);
    loading.textContent='Erreur, réessaie';
  }finally{
    loading.style.display='none';btn.disabled=false;
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}

function boot(){
  cfg=getConfig();
  if(!cfg){document.getElementById('setup').classList.remove('hidden');return}
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  updateTopbar();
  const cache=localStorage.getItem('iris_h_cache');
  if(cache){try{data=JSON.parse(cache).data;if(!data.fragments)data.fragments=[];if(!data.bible)data.bible=[];if(!data.taches_v2)data.taches_v2=[];if(!data.rec_suivi)data.rec_suivi=[];if(!data.skills)data.skills=[];if(!data.prospects)data.prospects=[];render()}catch(e){}}
  loadAll();
}
boot();
</script>
